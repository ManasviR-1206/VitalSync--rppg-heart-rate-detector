<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authorize | VitalSync</title>
    <link rel="stylesheet" href="css/theme.css">
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px;">
    <a href="index.html" style="position: absolute; top: 40px; left: 40px; color: var(--text-secondary); text-decoration: none; font-size: 0.9rem; display: flex; align-items: center; gap: 8px;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back to Home
    </a>

    <div class="glass card" style="width: 100%; max-width: 450px; padding: 40px;">
        <div style="text-align: center; margin-bottom: 32px;">
            <div style="width: 48px; height: 48px; background: var(--accent-primary); border-radius: 12px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--bg-main)" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </div>
            <h2 style="font-size: 1.8rem; margin-bottom: 8px;">Access Platform</h2>
            <p style="color: var(--text-secondary); font-size: 0.9rem;">Enter your credentials to access clinical tools.</p>
        </div>

        <form id="loginForm">
            <div style="margin-bottom: 20px;">
                <label style="display: block; font-size: 0.8rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 8px;">USERNAME</label>
                <input type="text" id="username" required style="width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border-glass); border-radius: 12px; padding: 14px; color: white; outline: none; transition: border-color 0.3s;" placeholder="e.g. admin">
            </div>
            <div style="margin-bottom: 24px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                    <label style="display: block; font-size: 0.8rem; font-weight: 600; color: var(--text-secondary);">PASSWORD</label>
                    <a href="#" style="font-size: 0.75rem; color: var(--accent-secondary); text-decoration: none;">Forgot?</a>
                </div>
                <input type="password" id="password" required style="width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border-glass); border-radius: 12px; padding: 14px; color: white; outline: none; transition: border-color 0.3s;" placeholder="••••••••">
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-bottom: 20px;">
                Authorize Session
            </button>

            <p style="text-align: center; color: var(--text-secondary); font-size: 0.85rem;">
                No account? <a href="#" style="color: var(--accent-primary); text-decoration: none;">Request Provider Access</a>
            </p>
        </form>
        <div id="errorMsg" style="margin-top: 16px; color: #ff4b4b; font-size: 0.85rem; text-align: center; display: none;"></div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
